<!DOCTYPE html>
<html>

<head>
    <title>dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f8;
        }
        .sidebar{
            background: linear-gradient(180deg, #1e1e2e, #667eea);
            color:white;
            height: 100vh;
            width: 220px;
            padding:20px;
            position: fixed;
            font-size: 20px;
            display:flex;
            flex-direction: column;
        }
        .main-content{
            margin-left:230px;
            padding: 30px;}
        .card{
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        } 
        .card-income  { border-left: 5px solid #38a169; }
        .card-expense { border-left: 5px solid #e53e3e; }
        .card-savings { border-left: 5px solid #667eea; }
        .card-balance { border-left: 5px solid #f6ad55; } 
        .nav-link {
            color: #aaa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
            text-decoration: none;
        }
        .nav-link:hover, .nav-link.active {
            background-color: #667eea;
            color: white;
        }  

    </style>
</head>

<body>
    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">FinTrack</h2>
        <a href="/dashboard" class="nav-link active">Dashboard</a>
        <a href="/add_expense" class="nav-link">Add Expenses</a>
        <a href="/budget" class="nav-link">Budget</a>
        <a href="/goals" class="nav-link">Goals</a>
        <a href="/add_income" class="nav-link">Add Income</a>
        <a href="/login" class="nav-link bg-danger mt-auto">Logout</a>
    </div>
    <div class="main-content">

        <h2 class="mb-4">Welcome Back </h2>

        <!-- Summary Cards -->
        <div class="row mb-4">

            <div class="col-md-3 mb-3">
                <div class="card p-3 card-income">
                    <p class="text-muted mb-1">Total Income</p>
                    <h3 class="text-success">₹45,000</h3>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card p-3 card-expense">
                    <p class="text-muted mb-1">Total Expenses</p>
                    <h3 class="text-danger" id="total_expense">₹0</h3>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card p-3 card-savings">
                    <p class="text-muted mb-1">Savings</p>
                    <h3 style="color: #667eea;">₹16,500</h3>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card p-3 card-balance">
                    <p class="text-muted mb-1">Balance</p>
                    <h3 class="text-warning">₹16,500</h3>
                </div>
            </div>

        </div>

        <!-- Recent Transactions -->
        <div class="card p-4">

            <h4 class="mb-3">Recent Transactions</h4>

            <table class="table table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody id="recent_transactions">
                    
                </tbody>
            </table>
            </div>
        </div>
    </div>

       
            <script>
                async function dashboard_load(){
                    let summary = await fetch("http://127.0.0.1:5000/dashboard/summary");
                    let data = await summary.json();
                    document.getElementById("total_expense").textContent = `₹${data.total_expenses.toFixed(2)}`;

                    let transaction = await fetch("http://127.0.0.1:5000/dashboard/recent_transactions");
                    let response = await transaction.json();
                    let rows = response.map(expense => 
                    `<tr>
                        <td>${expense.name}</td>
                        <td>₹${expense.amount}</td>
                        <td>${expense.category}</td>
                        <td>${expense.date}</td>
                        <td><span class="badge bg-danger">Expense</span></td>
                    </tr>`);
                    document.getElementById("recent_transactions").innerHTML = rows.join("");
                }
                dashboard_load();
            </script>

</body>

</html>
