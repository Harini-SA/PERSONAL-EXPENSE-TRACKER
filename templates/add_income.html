<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Income</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f8;
        }

        .card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        #total {
            font-weight: bold;
        }

        .sidebar {
            background: linear-gradient(180deg, #1e1e2e, #667eea);
            color: white;
            height: 100vh;
            width: 220px;
            padding: 20px;
            position: fixed;
            font-size: 20px;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            margin-left: 220px;
            padding: 20px;
        }

        .nav-link {
            color: #aaa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #667eea;
            color: white;
        } 
        </style>  
</head>
<body>
    <div class="sidebar ">
        <h2 style="margin-bottom: 30px;">FinTrack</h2>
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/add_expense" class="nav-link">Add Expenses</a>
        <a href="/budget" class="nav-link">Budget</a>
        <a href="/goals" class="nav-link">Goals</a>
        <a href="/add_income" class="nav-link active">Add Income</a>
        <a href="/login" class="nav-link bg-danger mt-auto">Logout</a>
    </div>
    <div class="main-content">
        <h2 class="mb-4">Add Income</h2>
        <form id="incomeForm">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" placeholder="e.g., Salary, Freelance, etc." required>
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Amount</label>
                <input type="number" class="form-control" id="amount">
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Date</label>
                <input type="date" class="form-control" id="date" required>
            </div>
            <button type="submit" class="btn btn-success">Add Income</button>
        </form>
        <div class="mt-3">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="recent_transactions">
                    <!-- Recent transactions will be loaded here -->
                </tbody>
        </div>
    </div>
    <script>
        let response = [];
        function rendertable(response){
            let rows = response.map(income => 
            `<tr>
                <td>${income.name}</td>
                <td>₹${income.amount}</td>
                <td>${income.date}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="edit_income(${income.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="delete_income(${income.id})">Delete</button>
                </td>
                </tr>`);
                document.getElementById("recent_transactions").innerHTML = rows.join("");

        }
        async function delete_income(income_id){
            let current = await fetch(`http://127.0.0.1:5000/income/${income_id}`,{   
            method : "DELETE" });
            load_income();
        }
        let editingId = null;
        function edit_income(income_id){
            let current = response.find(e => e.id ===income_id);
            document.querySelector('input[name="name"]').value = current.name;
            document.querySelector('input[name="amount"]').value = current.amount;
            document.querySelector('input[name="date"]').value = current.date;
            document.querySelector('form').scrollIntoView({behavior:"smooth"});
            editingId = income_id;
        }
        document.getElementById("incomeForm").addEventListener("submit", async function(event){
            event.preventDefault();
            const name = document.getElementById("name").value;
            const amount = document.getElementById("amount").value;
            const date = document.getElementById("date").value;

            if (!name || !amount || !date) {
            alert("Please fill all fields");
            return;
             }
            if (editingId){
                await fetch(`http://127.0.0.1:5000/income/${editingId}`,{
                    method:"PUT",
                    headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({name, amount, date})
                })
            editingId = null;
        }
            else {
                await fetch("http://127.0.0.1:5000/income",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({name, amount, date})
                })
            }
            load_income();
        }
)
    async function load_income(){
        let income = await fetch("http://127.0.0.1:5000/income");
        response = await income.json();
        rendertable(response);
    }
    load_income();
    </script>
    
</body>
</html>
