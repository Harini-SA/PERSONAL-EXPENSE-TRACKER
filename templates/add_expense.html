<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f8;
        }

        .card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        #total {
            font-weight: bold;
        }
    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand">Expense Tracker</a>
        </div>
    </nav>

    <div class="container mt-4">

        <h1 class="text-center text-primary mb-4">Expense Tracker Dashboard</h1>

        <!-- Add Expense Card -->
        <div class="card p-4 mb-4">

            <h3 class="text-center text-danger">Add Expense</h3>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" name="name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number" class="form-control" name="amount">
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>

                    <select class="form-control" name="category">
                        <option>Food</option>
                        <option>Transportation</option>
                        <option>Bills</option>
                        <option>Shopping</option>
                        <option>Entertainment</option>
                        <option>Health</option>
                        <option>Education</option>
                        <option>Travel</option>
                        <option>Groceries</option>
                        <option>Other</option>
                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" name="date">
                </div>

                <div class="text-center">
                    <button class="btn btn-success">Add Expense</button>
                </div>

            </form>

        </div>

        <!-- Expense Table -->

        <div class="card p-3">

            <h4 class="text-center">Expense List</h4>

            <table class="table table-striped table-hover table-bordered">

                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>

        <h3 class="text-center mt-3" id="total">
            Total Spending: <span class="text-danger">0</span>
        </h3>

    </div>

</body>

</html>
