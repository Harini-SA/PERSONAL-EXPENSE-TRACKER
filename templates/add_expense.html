<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f8;
        }

        .card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        #total {
            font-weight: bold;
        }

        .sidebar {
            background: linear-gradient(180deg, #1e1e2e, #667eea);
            color: white;
            height: 100vh;
            width: 220px;
            padding: 20px;
            position: fixed;
            font-size: 20px;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            margin-left: 220px;
            padding: 20px;
        }

        .nav-link {
            color: #aaa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #667eea;
            color: white;
        }
        
    </style>

</head>

<body>

    <div class="sidebar ">
        <h2 style="margin-bottom: 30px;">FinTrack</h2>
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/add_expense" class="nav-link active">Add Expenses</a>
        <a href="/budget" class="nav-link">Budget</a>
        <a href="/goals" class="nav-link">Goals</a>
        <a href="/login" class="nav-link bg-danger mt-auto">Logout</a>
    </div>

    <div class="main-content">

    <h2 class="mb-4"><i class="bi bi-credit-card" ></i> Add Expense</h2>
        <!-- Add Expense Card -->
        <div class="card p-4 mb-4">

            <h3 class="text-center text-danger">Add Expense</h3>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" name="name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number" class="form-control" name="amount">
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>

                    <select class="form-control" name="category">
                        <option value="">--select catagory--</option>
                        <option>Food</option>
                        <option>Transportation</option>
                        <option>Bills</option>
                        <option>Shopping</option>
                        <option>Entertainment</option>
                        <option>Health</option>
                        <option>Education</option>
                        <option>Travel</option>
                        <option>Groceries</option>
                        <option>Other</option>
                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" name="date">
                </div>

                <div class="text-center">
                    <button class="btn btn-success">Add Expense</button>
                </div>

            </form>

        </div>

        <!-- Expense Table -->

        <div class="card p-3">

            <h4 class="text-center">Expense List</h4>

            <table class="table table-striped table-hover table-bordered">

                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>

        <h3 class="text-center mt-3" id="total">
            Total Spending: <span class="text-danger">0</span>
        </h3>

    </div>
    <script>
        let expenses =[];
        function renderTable(expenses) {
           let rows = expenses.map(expense =>
        `<tr>
            <td>${expense.name}</td>
            <td>₹${expense.amount}</td>
            <td>${expense.category}</td>
            <td>${expense.date}</td>
            <td>
                <button class="btn btn-sm btn-danger"
                        onclick="deleteExpense(${expense.id})">Delete</button>
                <button class="btn btn-sm btn-primary"
                onclick="updateExpense(${expense.id})">Edit</button>
            </td>
        </tr>`
    );

    document.getElementById('tbody').innerHTML = rows.join('');

    let total = expenses.reduce((sum, e) => sum + e.amount, 0);
    document.getElementById("total").querySelector("span").textContent = '₹' + total;
}
async function deleteExpense(id) {
    await fetch(`http://127.0.0.1:5000/expenses/${id}`, {
        method: "DELETE"
    });
    loadExpenses();
}
let editingId = null;
function updateExpense(id){
    let current = expenses.find(e => e.id === id);
    document.querySelector('input[name="name"]').value = current.name;
    document.querySelector('input[name="amount"]').value = current.amount;
    document.querySelector('select[name="category"]').value = current.category;
    document.querySelector('input[name="date"]').value = current.date;
    document.querySelector('form').scrollIntoView({behavior: "smooth"});
    editingId = id;

}
let form = document.querySelector('form');

form.addEventListener("submit", async function(event) {
    event.preventDefault();

    let name     = document.querySelector('input[name="name"]').value.trim();
    let amount   = Number(document.querySelector('input[name="amount"]').value);
    let category = document.querySelector('select[name="category"]').value;
    let date     = document.querySelector('input[name="date"]').value;

    if (!name || !amount || !category || !date) {
        alert("Please fill all fields");
        return;
    }

    if (editingId) {
        await fetch(`http://127.0.0.1:5000/expenses/${editingId}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name, amount, category, date})
        });

    } else {
        await fetch("http://127.0.0.1:5000/expenses", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name, amount, category, date})
        });
    }

    form.reset();
    loadExpenses();
});
async function loadExpenses() {
    let response = await fetch("http://127.0.0.1:5000/expenses");
    expenses = await response.json();
    renderTable(expenses);
}
loadExpenses();
</script>

</body>

</html>
