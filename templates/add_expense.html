<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f8;
        }

        .card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        #total {
            font-weight: bold;
        }

        .sidebar {
            background: linear-gradient(180deg, #1e1e2e, #667eea);
            color: white;
            height: 100vh;
            width: 220px;
            padding: 20px;
            position: fixed;
            font-size: 20px;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            margin-left: 220px;
            padding: 20px;
        }

        .nav-link {
            color: #aaa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #667eea;
            color: white;
        }
        
    </style>

</head>

<body>

    <div class="sidebar ">
        <h2 style="margin-bottom: 30px;">💰 FinTrack</h2>
        <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
        <a href="add_expense.html" class="nav-link active">💳 Add Expenses</a>
        <a href="budget.html" class="nav-link">📊 Budget</a>
        <a href="goals.html" class="nav-link">🎯 Goals</a>
        <a href="login.html" class="nav-link bg-danger mt-auto">🚪 Logout</a>
    </div>

    <div class="main-content">

    <h2 class="mb-4"><i class="bi bi-credit-card" ></i> Add Expense</h2>
        <!-- Add Expense Card -->
        <div class="card p-4 mb-4">

            <h3 class="text-center text-danger">Add Expense</h3>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" name="name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number" class="form-control" name="amount">
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>

                    <select class="form-control" name="category">
                        <option value="">--select catagory--</option>
                        <option>Food</option>
                        <option>Transportation</option>
                        <option>Bills</option>
                        <option>Shopping</option>
                        <option>Entertainment</option>
                        <option>Health</option>
                        <option>Education</option>
                        <option>Travel</option>
                        <option>Groceries</option>
                        <option>Other</option>
                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" name="date">
                </div>

                <div class="text-center">
                    <button class="btn btn-success">Add Expense</button>
                </div>

            </form>

        </div>

        <!-- Expense Table -->

        <div class="card p-3">

            <h4 class="text-center">Expense List</h4>

            <table class="table table-striped table-hover table-bordered">

                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>

        <h3 class="text-center mt-3" id="total">
            Total Spending: <span class="text-danger">0</span>
        </h3>

    </div>

</body>

</html>
