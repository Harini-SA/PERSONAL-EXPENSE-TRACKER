<!DOCTYPE html>
<html>

<head>
    <title>goals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            background: linear-gradient(180deg, #1e1e2e, #667eea);
            color: white;
            height: 100vh;
            width: 220px;
            font-size: 20px;
            display: flex;
            padding: 20px;
            flex-direction: column;
            position: fixed;

        }

        .main-content {
            margin-left: 220px;
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .progress {
            height: 10px;
            border-radius: 10px;
        }

        .nav-link {
            color: #aaa;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .nav-link.active,
        .nav-link:hover {
            background-color: #667eea;
            color: white;
        }

        .goal-card {
            border-left: 5px solid #667eea;
        }

        body {
            background-color: #f4f6f8;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">FinTrack</h2>
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/add_expense" class="nav-link">Add Expenses</a>
        <a href="/budget" class="nav-link">Budget</a>
        <a href="/goals" class="nav-link active">Goals</a>
        <a href="/add_income" class="nav-link">Add Income</a>
        <a href="/login" class="nav-link mt-auto" style="background-color: #e53e3e; color: white;">Logout</a>
    </div>
    <div class="main-content">
        <h2 class="mb-4">
            <i class="bi bi-bullseye"></i> Goals
        </h2>

        <div>
            <h4 class="text-center mb-3">Add New Goal</h4>
            <form>
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Goal Name</label>
                        <input type="text" class="form-control" name="name" placeholder="enter your goal">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Target Amount</label>
                        <input type="number" class="form-control" name="target" placeholder="eg. 50000">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Saved Amount</label>
                        <input type="number" class="form-control" name="saved" placeholder="eg. 10000">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Deadline</label>
                        <input type="date" class="form-control" name="deadline">
                    </div>

                </div>

                <div class="text-center">
                    <button class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Add Goal
                    </button>
                </div>
            </form>
        </div>
        <div class="row" id="goals">
        </div>
    </div>
    <script>
        let goals = []
        function getColor(percent) {
            if (percent < 50) return "bg-danger";
            if (percent < 80) return "bg-warning";
            return "bg-success";
        }
        function renderGoals(goals) {
            let rows = goals.map(goal => {
                let percentage = Math.min(((goal.saved / goal.target) * 100).toFixed(0), 100);
                return `
                <div class="col-md-6 mt-3 mb-4">
                <div class="card p-4 goal-card">
                    <div class="d-flex justify-content-between mb-2">
                        <h5>${goal.name}</h5>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Saved:${goal.saved}</span>
                        <span class="text-muted">Target:${goal.target}</span>
                    </div>
                    <div class="progress mb-2">
<div class="progress-bar ${getColor(percentage)}"
     style="width:${percentage}%">
</div>                    </div>
                    <div class="d-flex justify-content-between">
                        <small class="text-muted">
                            <i class="bi bi-calendar"></i> Deadline: ${goal.deadline}
                        </small>
                        <small class="text-warning">${percentage}% completed</small>
                    </div>
                    <div class="mt-3 text-end">
                        <button class="btn btn-sm btn-danger" onclick= deleteGoal(${goal.id})>
                            <i class="bi bi-trash"></i> Delete
                        </button>
                        <button class="btn btn-sm btn-success"
        onclick="addSavings(${goal.id})">
    Add Savings
</button>
                    </div>
                </div>
            </div>`

            }).join("")
            document.getElementById("goals").innerHTML = rows;
        }
        let form = document.querySelector("form");
        form.addEventListener("submit", async function apiGoals(event) {
            event.preventDefault();
            let name = document.querySelector('input[name="name"]').value;
            let target = document.querySelector('input[name="target"]').value;
            let saved = document.querySelector('input[name="saved"]').value
            let deadline = document.querySelector('input[name="deadline"]').value;
            if (!name || !target || !saved || !deadline) {
                alert("please fill all the details");
                return
            }
            form.reset();
            await fetch("http://127.0.0.1:5000/api/goals", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, target, saved, deadline }),

            })
            loadGoals();
        })
        async function deleteGoal(id) {
            await fetch(`http://127.0.0.1:5000/api/goals/${id}`, {
                method: "DELETE"

            });
            loadGoals();
        }
        async function addSavings(id) {
            let amount = prompt("Enter amount to add:");

            if (!amount || amount <= 0) {
                return;
            }

            await fetch(`http://127.0.0.1:5000/api/goals/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    saved: amount
                })
            });

            loadGoals();
        }


        async function loadGoals() {
            let response = await fetch("http://127.0.0.1:5000/api/goals");
            goals = await response.json();
            renderGoals(goals)
        }
        loadGoals();
    </script>
</body>

</html>
