<!DOCTYPE html>
<html>

<head>
    <title>Budget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f8;
        }

        .sidebar {
            background: linear-gradient(180deg, #1e1e2e, #667eea);
            color: white;
            height: 100vh;
            width: 220px;
            padding: 20px;
            position: fixed;
            font-size: 20px;
            display: flex;
            flex-direction: column;
        }

        .nav-link {
            color: #aaa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #667eea;
            color: white;
        }

        .main-content {
            margin-left: 230px;
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .progress {
            height: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">FinTrack</h2>
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/add_expense" class="nav-link"> Add Expenses</a>
        <a href="/budget" class="nav-link active">Budget</a>
        <a href="/goals" class="nav-link">Goals</a>
        <a href="/add_income" class="nav-link">Add Income</a>
        <a href="/login" class="nav-link bg-danger mt-auto">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <h2 class="mb-4">📊 Budget Tracker</h2>

        <!-- Set Budget Form -->
        <div class="card p-4 mb-4">
            <h4 class="text-center mb-3">Set Budget</h4>

            <form>
                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-control" name="category">
                            <option value="">-- Select Category --</option>
                            <option>Food</option>
                            <option>Transportation</option>
                            <option>Bills</option>
                            <option>Shopping</option>
                            <option>Entertainment</option>
                            <option>Health</option>
                            <option>Education</option>
                            <option>Travel</option>
                            <option>Groceries</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Budget Amount</label>
                        <input type="number" class="form-control" name="amount" placeholder="Enter amount">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Month</label>
                        <input type="month" name="month" class="form-control">
                    </div>

                </div>

                <div class="text-center">
                    <button class="btn btn-primary" id="budget">Set Budget</button>
                </div>
            </form>
        </div>


        <!-- Budget List -->
        <div class="card p-4">
            <h4 class="text-center mb-4">Budget Overview</h4>

            <div id="budgetlist">


            </div>

        </div>
    </div>

    </div>
    <script>
        let budgets = [];
            function getColor(percentage) {
                if (percentage < 50) {
                    return "bg-success";
                }
                else if (percentage < 80) {
                    return "bg-warning";
                }
                else {
                    return "bg-danger";
                }
            }
        function budget(budgets) {
            let budget = budgets.map(budget => {
                return `
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <span>${budget.category}</span>
                    <span class="text-muted">${budget.spent_amount}/${budget.budget_amount}</span>
                    <button class="btn btn-sm btn-danger"
                onclick="deleteBudget(${budget.id})">
            Delete
        </button>
                </div>
                <div class="progress">
    <div class="progress-bar ${getColor(budget.percentage)}"
         style="width:${budget.percentage}%">
    </div>
</div>
                
            </div>`
            }).join("");
            document.getElementById("budgetlist").innerHTML = budget;
        }
        let form = document.querySelector("form")
        form.addEventListener("submit", async function (event) {
            event.preventDefault();
            let category = document.querySelector('select[name="category"]').value;
            let amount = document.querySelector('input[name="amount"]').value;
            let month = document.querySelector('input[name="month"]').value;
            if (!amount || !category || !month) {
                alert("please fill all details");
                return
            }
            form.reset();
            await fetch("http://127.0.0.1:5000/budget_income", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount, category, month }),
            }
            )
            loadBudget();
        })
        async function deleteBudget(id) {
                await fetch(`http://127.0.0.1:5000/budget_income/${id}`, {
                    method: "DELETE"
                });

                loadBudget();
            }

        async function loadBudget() {
            let response = await fetch("http://127.0.0.1:5000/budget_summary");
            budgets = await response.json();
            budget(budgets);
        }
        loadBudget();
    </script>


</body>

</html>
