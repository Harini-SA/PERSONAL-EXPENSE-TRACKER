<!DOCTYPE html>
<html>
<head>
    <title>Budget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f8;
        }

        .sidebar {
            background: linear-gradient(180deg, #1e1e2e, #667eea);
            color: white;
            height: 100vh;
            width: 220px;
            padding: 20px;
            position: fixed;
            font-size: 14px;
            display: flex;
            flex-direction: column;
        }

        .nav-link {
            color: #aaa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
            text-decoration: none;
        }

        .nav-link:hover, .nav-link.active {
            background-color: #667eea;
            color: white;
        }

        .main-content {
            margin-left: 230px;
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .progress {
            height: 10px;
            border-radius: 10px;
        }
        </style>
        </head>
        <body>
            <div class="sidebar">
        <h2 style="margin-bottom: 30px;">💰 FinTrack</h2>
        <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
        <a href="add_expense.html" class="nav-link">💳 Add Expenses</a>
        <a href="budget.html" class="nav-link active">📊 Budget</a>
        <a href="goals.html" class="nav-link">🎯 Goals</a>
        <a href="login.html" class="nav-link mt-auto" style="color: #e53e3e;">🚪 Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <h2 class="mb-4">📊 Budget Tracker</h2>

        <!-- Set Budget Form -->
        <div class="card p-4 mb-4">
            <h4 class="text-center mb-3">Set Budget</h4>

            <form>
                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-control" name="category">
                            <option value="">-- Select Category --</option>
                            <option>Food</option>
                            <option>Transportation</option>
                            <option>Bills</option>
                            <option>Shopping</option>
                            <option>Entertainment</option>
                            <option>Health</option>
                            <option>Education</option>
                            <option>Travel</option>
                            <option>Groceries</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Budget Amount</label>
                        <input type="number" class="form-control" placeholder="Enter amount">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Month</label>
                        <input type="month" class="form-control">
                    </div>

                </div>

                <div class="text-center">
                    <button class="btn btn-primary">Set Budget</button>
                </div>
            </form>
        </div>

        <!-- Budget List -->
        <div class="card p-4">
            <h4 class="text-center mb-4">Budget Overview</h4>

            <!-- Food Budget -->
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <span>🍔 Food</span>
                    <span class="text-muted">₹2,500 / ₹5,000</span>
                </div>
                <div class="progress">
                    <div class="progress-bar bg-success" style="width: 50%"></div>
                </div>
            </div>

            <!-- Transport Budget -->
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <span>🚗 Transportation</span>
                    <span class="text-muted">₹1,800 / ₹2,000</span>
                </div>
                <div class="progress">
                    <div class="progress-bar bg-warning" style="width: 90%"></div>
                </div>
            </div>

            <!-- Entertainment Budget -->
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <span>🎬 Entertainment</span>
                    <span class="text-muted">₹2,200 / ₹2,000</span>
                </div>
                <div class="progress">
                    <div class="progress-bar bg-danger" style="width: 100%"></div>
                </div>
            </div>

            <!-- Shopping Budget -->
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <span>🛍️ Shopping</span>
                    <span class="text-muted">₹1,000 / ₹4,000</span>
                </div>
                <div class="progress">
                    <div class="progress-bar bg-success" style="width: 25%"></div>
                </div>
            </div>

        </div>

    </div>


        </body>
</html>
